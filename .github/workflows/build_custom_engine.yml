name: "Build Custom Godot 4.6 Engine"

on:
  workflow_dispatch:

jobs:
  build-custom-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.20 # Verified for Godot 4.6.x

      - name: Set up Python & SCons
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SCons
        run: pip install scons

      - name: Clone Godot 4.6 Source
        run: |
          git clone --depth 1 --branch 4.6-stable https://github.com/godotengine/godot.git godot-source

      - name: Compile Custom Engine (Threaded)
        run: |
          cd godot-source
          # 'threads=yes' is critical for your SharedArrayBuffer performance
          scons platform=web target=template_release threads=yes \
            optimize=speed \
            module_3d_enabled=no \
            module_physics_3d_enabled=no \
            module_navigation_enabled=no \
            module_xr_enabled=no \
            module_basis_universal_enabled=no \
            module_meshoptimizer_enabled=no \
            disable_advanced_gui=no \
            -j$(nproc)

      - name: Package Template
        run: |
          mkdir -p release-files
          # Godot 4.6 SCons output for web is typically godot.web.template_release.wasm32.zip
          # We rename it to the 'standard' name the exporter looks for
          cp godot-source/bin/godot.web.template_release.wasm32.zip release-files/web_release.zip
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.6-custom-engine
          name: "Graphos Custom Engine 4.6"
          files: release-files/web_release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
