name: "Build Custom Godot 4.6 Engine"
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.20 # Required for Godot 4.6+
      - name: Setup Build Tools
        run: |
          python -m pip install scons
          git clone --depth 1 --branch 4.6-stable https://github.com/godotengine/godot.git godot-source
      - name: Compile
        run: |
          cd godot-source
          # We enable threads to match your wasm-opt config
          scons platform=web target=template_release threads=yes \
            optimize=speed module_3d_enabled=no module_physics_3d_enabled=no \
            module_navigation_enabled=no module_xr_enabled=no \
            module_basis_universal_enabled=no module_meshoptimizer_enabled=no \
            disable_advanced_gui=no -j$(nproc)
      - name: Package for Godot Exporter
        run: |
          mkdir -p release
          # Godot 4.6 with threads=yes creates files with '.threads' in the name.
          # We rename them to the standard names the headless exporter looks for.
          find godot-source/bin/ -name "*.wasm" -exec cp {} release/web_release.wasm \;
          find godot-source/bin/ -name "*.js" -exec cp {} release/web_release.js \;
          cd release && zip -r ../web_release.zip .
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.6-custom
          files: web_release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
