name: "Deploy Graphos"
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  export-web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot 4.6 Export Templates
        run: |
          mkdir -p /github/home/.local/share/godot/export_templates/4.6.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* /github/home/.local/share/godot/export_templates/4.6.stable/

      - name: Setup Web Export
        run: |
          mkdir -v -p build/web
          godot -v --headless --export-release "Web" build/web/index.html

      - name: Patch for SharedArrayBuffer
        run: |
          curl -fsSL https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js -o build/web/coi-serviceworker.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.js"></script>|' build/web/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
