name: "Deploy Graphos"
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  export-web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Web Export
        run: |
          mkdir -v -p build/web
          godot -v --headless --export-release "Web" build/web/index.html

      - name: Patch for SharedArrayBuffer
        run: |
          curl -fsSL https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js -o build/web/coi-serviceworker.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.js"></script>|' build/web/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
