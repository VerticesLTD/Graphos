name: Deploy Godot Web to Home Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION_TAG: "4.3-stable" # GitHub release tag
      GODOT_TEMPLATES_DIR: "4.3.stable" # Directory name Godot uses

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Godot editor
        run: |
          URL_EDITOR="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION_TAG}/Godot_v${GODOT_VERSION_TAG}_linux.x86_64.zip"
          echo "Downloading Godot editor from: $URL_EDITOR"

          curl -L \
            --retry 5 \
            --retry-delay 10 \
            --retry-all-errors \
            -o godot.zip \
            "$URL_EDITOR"

          unzip godot.zip
          mv Godot_v${GODOT_VERSION_TAG}_linux.x86_64 godot
          chmod +x godot

      - name: Download Godot export templates
        run: |
          mkdir -p "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATES_DIR}"

          URL_TEMPLATES="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION_TAG}/Godot_v${GODOT_VERSION_TAG}_export_templates.tpz"
          echo "Downloading Godot export templates from: $URL_TEMPLATES"

          curl -L \
            --retry 5 \
            --retry-delay 10 \
            --retry-all-errors \
            -o templates.tpz \
            "$URL_TEMPLATES"

          unzip templates.tpz -d "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATES_DIR}"

          echo "Contents of export_templates directory:"
          ls -1 "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATES_DIR}"

          cd "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATES_DIR}"

          # Work around Godot 4.3 web_nothreads naming bug:
          # If web_debug/web_release exist, rename them to web_nothreads_*
          if [ -f "web_debug.zip" ] && [ ! -f "web_nothreads_debug.zip" ]; then
            mv web_debug.zip web_nothreads_debug.zip
          fi

          if [ -f "web_release.zip" ] && [ ! -f "web_nothreads_release.zip" ]; then
            mv web_release.zip web_nothreads_release.zip
          fi

          echo "After renaming:"
          ls -1

      - name: Export Web
        run: |
          # Uses your preset name "Web" and the export_path from export_presets.cfg
          ./godot --headless --quiet --path . \
            --export-release "Web"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          # Adjust if you changed export_path; with your config it’s graphos-export/Graphos.html
          rsync -avz --delete \
            graphos-export/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/
